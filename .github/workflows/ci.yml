name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Compile-check all Python sources
        run: python -m compileall -q dashboard "prediction model" analysis

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/web/package-lock.json
      - run: npm ci
      - run: npm run build
