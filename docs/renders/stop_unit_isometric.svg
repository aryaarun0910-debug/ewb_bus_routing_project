text-anchor="end">SX1278 LoRa transmitter</text><text x="657.552" y="305.2" font-family="Arial" font-size="15" fill="#17AdaA" text-anchor="end">433 MHz · licence-free ISM</text><text x="657.552" y="325.2" font-family="Arial" font-size="13" fill="#9A9A9A" text-anchor="end">duty cycle &lt;10% · ≤10 mW ERP</text><line x1="1012.0712" y1="597.2" x2="1146.0711999999999" y2="547.2" stroke="#555555" stroke-width="1.2"/><text x="1154.0711999999999" y="541.2" font-family="Arial" font-size="16" fill="#FFFFFF" >Solar trickle-charge</text><text x="1154.0711999999999" y="561.2" font-family="Arial" font-size="13" fill="#9A9A9A" >no mains wiring at the stop</text><line x1="1067.6602" y1="763.75" x2="1223.6602" y2="799.75" stroke="#555555" stroke-width="1.2"/><text x="1229.6602" y="793.75" font-family="Arial" font-size="16" fill="#FFFFFF" >156-LED network map</text><text x="1229.6602" y="813.75" font-family="Arial" font-size="13" fill="#9A9A9A" >WS2812B · same driver logic as today's FPGA build</text><line x1="983.0356" y1="526.8" x2="953.0356" y2="470.79999999999995" stroke="#555555" stroke-width="1.2"/><text x="947.0356" y="464.79999999999995" font-family="Arial" font-size="15" fill="#FFFFFF" text-anchor="end">LoRa receiver</text><line x1="1033.1068" y1="903.5" x2="1139.1068" y2="945.5" stroke="#555555" stroke-width="1.2"/><text x="1145.1068" y="941.5" font-family="Arial" font-size="15" fill="#FFFFFF" >Battery (LiFePO4)</text><text x="1145.1068" y="959.5" font-family="Arial" font-size="12.5" fill="#9A9A9A" >take-back clause at end-of-life</text><text x="1059.25456" y="611.73" font-family="Arial" font-size="13.5" fill="#0E7C7B" text-anchor="middle">mesh relay hop</text><text x="862.7938" y="321" font-family="Arial" font-size="13.5" fill="#9A9A9A" text-anchor="middle">per-stop packet: demand level · next-bus ETA · route colour</text><rect x="70" y="60" width="8" height="8" fill="#C41E3A"/><text x="94" y="70" font-family="Arial" font-size="15" fill="#9A9A9A" letter-spacing="5">PROPOSED LIVE ARCHITECTURE</text><text x="70" y="122" font-family="Cambria, Georgia, serif" font-size="38" font-weight="bold" fill="#FFFFFF">One hub. Every stop. No mains, no SIM, no app.</text><text x="70" y="156" font-family="Arial" font-size="16" fill="#9A9A9A" >From snapshot ROM to live display — the WS2812B drive logic at each stop is unchanged.</text><text x="70" y="1020" font-family="Arial" font-size="12.5" fill="#555555" >UK2026-82 · concept render from docs/radio_signalling_report.md — generated programmatically, not a photograph</text></svg>